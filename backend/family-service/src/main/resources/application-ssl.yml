server:
  port: ${SERVER_PORT:8443}
  address: 0.0.0.0
  ssl:
    enabled: true
    key-store: ${SSL_KEY_STORE:classpath:qioba.cn.p12}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
