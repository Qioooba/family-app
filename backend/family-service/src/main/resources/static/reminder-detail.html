<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提醒详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        
        .icon {
            font-size: 40px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .time {
            font-size: 14px;
            color: #999;
        }
        
        /* 提醒内容 */
        .content-section {
            margin-bottom: 28px;
        }
        
        .reminder-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .reminder-content {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid #667eea;
        }
        
        .reminder-content p {
            font-size: 15px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 8px;
        }
        
        .reminder-content p:last-child {
            margin-bottom: 0;
        }
        
        /* 小程序码区域 */
        .qr-section {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
        }
        
        .qr-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .qr-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .qr-image-wrapper {
            position: relative;
            display: inline-block;
            padding: 12px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
            margin-bottom: 16px;
        }
        
        .qr-image {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            display: block;
        }
        
        .qr-badge {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: #07c160;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }
        
        .qr-tip {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .qr-hint {
            font-size: 12px;
            color: #999;
        }
        
        /* 底部按钮 */
        .footer {
            margin-top: 24px;
        }
        
        .open-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            margin-bottom: 12px;
        }
        
        .open-btn:active {
            transform: scale(0.98);
        }
        
        .home-link {
            display: block;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
        }
        
        /* 状态提示 */
        .loading, .error {
            text-align: center;
            padding: 60px 20px;
            color: #fff;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 页面加载
        window.onload = function() {
            const token = getUrlParam('token');
            const title = getUrlParam('title') || '提醒通知';
            const content = getUrlParam('content') || '';
            
            if (!token) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <div class="card">
                            <p>无效的访问链接</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 显示详情页面
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="header">
                        <div class="icon-wrapper">
                            <span class="icon">✨</span>
                        </div>
                        <h1 class="title">提醒详情</h1>
                    </div>
                    
                    <div class="content-section">
                        <div class="reminder-title">${decodeURIComponent(title)}</div>
                        ${content ? `
                        <div class="reminder-content">
                            <p>${decodeURIComponent(content)}</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="qr-section">
                        <div class="qr-title">进入家庭小程序</div>
                        <div class="qr-subtitle">查看完整提醒内容</div>
                        
                        <div class="qr-image-wrapper">
                            <img class="qr-image" src="/miniapp-qr.png" alt="小程序码">
                            <div class="qr-badge">👆 长按识别</div>
                        </div>
                        
                        <div class="qr-tip">长按二维码识别进入小程序</div>
                        <div class="qr-hint">或在微信中扫一扫</div>
                    </div>
                    
                    <div class="footer">
                        <a href="/auto-login.html?token=${token}" class="open-btn">
                            一键打开小程序
                        </a>
                        <a href="/auto-login.html?token=${token}" class="home-link">
                            进入小程序首页 →
                        </a>
                    </div>
                </div>
            `;
        };
    </script>
</body>
</html>
