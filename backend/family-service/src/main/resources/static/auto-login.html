<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在登录家庭小程序...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #fff;
            max-width: 300px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 32px;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 14px;
            opacity: 0.9;
        }
        .steps {
            margin-top: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            text-align: left;
        }
        .step:last-child {
            margin-bottom: 0;
        }
        .step-num {
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .error {
            background: rgba(255,100,100,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
        }
        .error-text {
            font-size: 14px;
            margin-bottom: 12px;
        }
        .retry-btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <div class="title">家庭小程序</div>
        <div class="subtitle">正在自动登录...</div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">验证登录信息</div>
        </div>

        <div class="steps" id="steps">
            <div class="step">
                <div class="step-num">1</div>
                <span>验证临时Token</span>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <span>保存登录凭证</span>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <span>打开小程序首页</span>
            </div>
        </div>

        <div class="error" id="error" style="display: none;">
            <div class="error-text">登录链接已过期或无效</div>
            <button class="retry-btn" onclick="goToMiniProgram()">手动进入小程序</button>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 获取token
        const token = getQueryParam('token');

        // 跳转到小程序（使用URL Scheme）
        function goToMiniProgram() {
            // 微信小程序URL Scheme
            // 需要在微信公众平台配置URL Scheme
            const appId = 'wxbdc70536c5e52b82';
            const path = 'pages/home/index';
            
            // 尝试使用URL Scheme跳转
            const wxUrl = `weixin://dl/miniprogram?appid=${appId}&path=${encodeURIComponent(path)}`;
            
            // 保存token到localStorage，小程序启动时可以读取
            if (token) {
                localStorage.setItem('family_auto_login_token', token);
                // 同时保存到sessionStorage用于当前会话
                sessionStorage.setItem('family_auto_login_token', token);
            }
            
            // 显示提示
            showManualGuide();
        }

        // 显示手动操作指南
        function showManualGuide() {
            alert('请按以下步骤进入小程序：\n\n1. 点击右上角「···」\n2. 选择「在小程序中打开」或「浮窗」\n3. 小程序会自动识别登录状态\n\n或返回微信首页，下拉查看最近使用的小程序');
        }

        // 验证token并保存
        async function validateAndLogin() {
            if (!token) {
                showError('缺少登录凭证');
                return;
            }

            try {
                // 保存token到localStorage
                localStorage.setItem('family_auto_login_token', token);
                sessionStorage.setItem('family_auto_login_token', token);
                
                // 尝试通过API验证token（可选，用于提前检查）
                // const res = await fetch(`/api/auth/validate-temp-token?token=${token}`);
                
                // 延迟后提示用户进入小程序
                setTimeout(() => {
                    document.querySelector('.loading-text').textContent = '请手动进入小程序';
                    goToMiniProgram();
                }, 2000);
                
            } catch (e) {
                console.error('保存登录凭证失败:', e);
                showError('保存登录凭证失败');
            }
        }

        // 显示错误
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('steps').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.querySelector('.error-text').textContent = msg;
        }

        // 页面加载完成后执行
        window.onload = validateAndLogin;
    </script>
</body>
</html>
