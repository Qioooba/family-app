<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在登录...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #fff;
            max-width: 300px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 32px;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 14px;
            opacity: 0.9;
        }
        .error {
            background: rgba(255,100,100,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
        }
        .error-text {
            font-size: 14px;
            margin-bottom: 12px;
        }
        .retry-btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <div class="title">家庭小程序</div>
        <div class="subtitle" id="subtitle">正在自动登录...</div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">请稍候</div>
        </div>

        <div class="error" id="error" style="display: none;">
            <div class="error-text" id="errorText">登录失败</div>
            <button class="retry-btn" onclick="location.reload()">重新尝试</button>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 获取token
        const token = getQueryParam('token');
        const subtitle = document.getElementById('subtitle');
        const loadingText = document.querySelector('.loading-text');

        // 执行自动登录
        async function autoLogin() {
            if (!token) {
                showError('缺少登录凭证');
                return;
            }

            try {
                loadingText.textContent = '正在验证...';
                
                // 调用后端API进行免密登录
                const res = await fetch('https://qioba.cn:8443/api/auth/auto-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ tempToken: token })
                });
                
                const data = await res.json();
                
                if (data.code === 200) {
                    // 登录成功，保存token
                    const authToken = data.data.token;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    
                    loadingText.textContent = '登录成功，正在跳转...';
                    subtitle.textContent = '欢迎回来！';
                    
                    // 延迟后跳转到H5首页
                    setTimeout(() => {
                        window.location.href = 'https://qioba.cn';
                    }, 1000);
                } else {
                    showError(data.message || '登录链接已过期');
                }
            } catch (error) {
                console.error('登录失败:', error);
                showError('网络错误，请重试');
            }
        }

        // 显示错误
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorText').textContent = msg;
            subtitle.textContent = '登录遇到问题';
        }

        // 页面加载后执行
        window.onload = autoLogin;
    </script>
</body>
</html>
