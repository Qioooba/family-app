<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在登录...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #fff;
            max-width: 320px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 32px; }
        .btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 14px 32px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: rgba(255,100,100,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <div class="title">家庭小程序</div>
        <div class="subtitle" id="subtitle">正在自动登录...</div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div id="actionArea" style="display: none; margin-top: 20px;">
            <a id="miniappBtn" class="btn" href="#">打开小程序</a>
        </div>

        <div class="error" id="error" style="display: none;">
            <div id="errorText">登录失败</div>
        </div>
    </div>

    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script>
        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const token = getQueryParam('token');
        const taskId = getQueryParam('taskId') || '';
        const subtitle = document.getElementById('subtitle');
        const actionArea = document.getElementById('actionArea');
        const miniappBtn = document.getElementById('miniappBtn');
        const errorArea = document.getElementById('error');

        // 小程序配置
        const MINIAPP_ID = 'wxbdc70536c5e52b82';
        
        // 生成小程序路径
        function getMiniProgramPath() {
            if (taskId) {
                return `pages/task/detail?id=${taskId}&from=wechat`;
            }
            return 'pages/home/index?from=wechat';
        }

        // 在微信环境打开小程序
        function openMiniProgram() {
            const path = getMiniProgramPath();
            
            // 方法1: 使用微信URL Scheme (iOS有效)
            const scheme = `weixin://dl/business/?appid=${MINIAPP_ID}&path=${encodeURIComponent(path)}`;
            
            // 方法2: 使用云开发跳转 (更稳定)
            // 需要先配置云开发
            
            // 方法3: 跳转到小程序码页面
            // window.location.href = `/miniapp-qr.html?path=${encodeURIComponent(path)}`;
            
            // 目前使用H5页面承载
            window.location.href = `https://qioba.cn:8443/h5/?token=${token}&path=${encodeURIComponent(path)}`;
        }

        // 执行自动登录
        async function autoLogin() {
            if (!token) {
                showError('缺少登录凭证');
                return;
            }

            try {
                const res = await fetch('https://qioba.cn:8443/api/auth/auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tempToken: token })
                });
                
                const data = await res.json();
                
                if (data.code === 200) {
                    // 登录成功
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    
                    subtitle.textContent = '登录成功！';
                    document.getElementById('loading').style.display = 'none';
                    actionArea.style.display = 'block';
                    
                    // 设置跳转按钮
                    miniappBtn.onclick = function(e) {
                        e.preventDefault();
                        openMiniProgram();
                    };
                    
                    // 自动跳转
                    setTimeout(() => {
                        openMiniProgram();
                    }, 500);
                } else {
                    showError(data.message || '登录链接已过期');
                }
            } catch (error) {
                console.error('登录失败:', error);
                showError('网络错误，请重试');
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            actionArea.style.display = 'none';
            errorArea.style.display = 'block';
            document.getElementById('errorText').textContent = msg;
            subtitle.textContent = '登录遇到问题';
        }

        window.onload = autoLogin;
    </script>
</body>
</html>
