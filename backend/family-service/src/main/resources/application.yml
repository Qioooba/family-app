server:
  port: 8443
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # SSL/HTTPS 配置（本地开发禁用）
  ssl:
    enabled: false

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  application:
    name: family-app
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    # 确保JSON输出使用UTF-8编码
    mapper:
      default-view-inclusion: true
  
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/family_app?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# 文件上传配置
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads}
    base-url: ${FILE_UPLOAD_BASE_URL:${app.base-url}}

# 微信小程序配置（使用环境变量传入）
weixin:
  appId: ${WEIXIN_APPID:}
  appSecret: ${WEIXIN_APPSECRET:}

# 企业微信配置（用于任务通知推送）
wechat:
  work:
    corpid: ${WECHAT_WORK_CORPID:}
    agentid: ${WECHAT_WORK_AGENTID:}
    secret: ${WECHAT_WORK_SECRET:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: ${SA_TOKEN_LOG_ENABLED:false}
  is-read-cookie: false
  is-read-header: true
  # JWT配置
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:change-me-in-production}

app:
  base-url: ${APP_BASE_URL:http://localhost:8443}
  public-origin: ${APP_PUBLIC_ORIGIN:http://localhost:8443}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.family: ${LOG_LEVEL_APP:INFO}
