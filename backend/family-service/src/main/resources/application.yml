server:
  port: 8443
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # SSL/HTTPS 配置（正式证书）
  ssl:
    enabled: true
    key-store: classpath:qioba.cn.p12
    key-store-password: qioba123
    key-store-type: PKCS12
    key-alias: qioba

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  application:
    name: family-app
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    # 确保JSON输出使用UTF-8编码
    mapper:
      default-view-inclusion: true
  
  datasource:
    url: jdbc:mysql://localhost:3306/family_app?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: your_secure_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# 文件上传配置
file:
  upload:
    path: ./uploads
    base-url: http://qioba.cn:8081

# 微信小程序配置（使用环境变量传入）
weixin:
  appId: ${WEIXIN_APPID:wxbdc70536c5e52b82}
  appSecret: ${WEIXIN_APPSECRET:ee79692373557e80d206c09a1876dbea}

# 企业微信配置（用于任务通知推送）
wechat:
  work:
    corpid: ${WECHAT_WORK_CORPID:}
    agentid: ${WECHAT_WORK_AGENTID:}
    secret: ${WECHAT_WORK_SECRET:}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true
  is-read-cookie: false
  is-read-header: true

logging:
  level:
    com.family: DEBUG
